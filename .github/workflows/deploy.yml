name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Opt into Node 24 for Actions runtime (checkout/setup-node); see GitHub deprecation of Node 20 on runners.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # GitHub job ceiling (FTP-Deploy also has its own `timeout` ms below)
    timeout-minutes: 30

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (prevents random version issues)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Install + build (only if Node project)
      - name: Install dependencies and build
        if: hashFiles('package.json') != ''
        run: |
          npm ci
          npm run build

      # 4. Detect correct output folder
      - name: Resolve deploy output folder
        id: deploy-path
        run: |
          if [ -d out ]; then echo "dir=./out/" >> $GITHUB_OUTPUT
          elif [ -d dist ]; then echo "dir=./dist/" >> $GITHUB_OUTPUT
          elif [ -d build ]; then echo "dir=./build/" >> $GITHUB_OUTPUT
          else echo "dir=./" >> $GITHUB_OUTPUT
          fi

      # 5. Deploy via FTP (clean deploy = no nesting issues)
      # ETIMEDOUT on port 21 = TCP never connects (firewall/host/network). The `timeout:` below does not fix that.
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # If hPanel says "FTP over TLS (explicit)", uncomment:
          # protocol: ftps
          # port: 21
          # security: loose
          # Default 30000 ms is too low for clean-slate + many files; raises "Timeout (control socket)"
          timeout: 600000
          local-dir: ${{ steps.deploy-path.outputs.dir }}
          server-dir: /domains/rongurfinkel.com/public_html/
          dangerous-clean-slate: true
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**