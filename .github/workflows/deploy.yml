name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

# One production deploy at a time; do not cancel an in-flight deploy.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Fail the job if any remote command fails
          script_stop: true
          # Idempotent: safe to re-run; resets to origin/main and recreates containers
          script: |
            set -euo pipefail
            cd /opt/apps/rongurfinkel
            git fetch origin
            git reset --hard origin/main
            docker compose down
            docker compose build --pull
            docker compose up -d
            docker image prune -f

      - name: Verify website responds with HTTP 200
        env:
          SITE_URL: https://rongurfinkel.com
        run: |
          set -euo pipefail
          echo "Waiting for site to become healthy at ${SITE_URL} ..."
          for attempt in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 \
              -L --retry 2 --retry-connrefused "${SITE_URL}/" || echo "000")
            echo "Attempt ${attempt}/12 → HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed: ${SITE_URL} did not return HTTP 200."
          exit 1
