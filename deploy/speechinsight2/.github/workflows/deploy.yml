# Copy this file to the SpeechInsight2 repo as .github/workflows/deploy.yml
# Secrets required: RENDER_API_KEY, RENDER_SERVICE_ID (Render Dashboard → Account → API Keys; Service ID from service settings/URL)

name: Build and Deploy to Render

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/speechinsight2/Dockerfile
          push: false
          load: true
          tags: speechinsight2:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_API_KEY or RENDER_SERVICE_ID not set; skipping deploy trigger."
            echo "Configure secrets in the SpeechInsight2 repo to enable deploy."
            exit 0
          fi
          curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' \
            | cat
